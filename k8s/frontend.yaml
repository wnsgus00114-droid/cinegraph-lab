apiVersion: apps/v1
kind: Deployment
metadata: {name: frontend, namespace: cinegraph}
spec:
  replicas: 1
  selector: {matchLabels: {app: frontend}}
  template:
    metadata: {labels: {app: frontend}}
    spec:
      containers:
        - name: frontend
          image: cinegraph-front:latest
          imagePullPolicy: IfNotPresent
          env: [{name: API_URL, value: "http://api:8000"}]
          ports: [{containerPort: 8501}]
          readinessProbe: {httpGet: {path: /_stcore/health, port: 8501}, initialDelaySeconds: 5, periodSeconds: 5}
---
apiVersion: v1
kind: Service
metadata: {name: frontend, namespace: cinegraph}
spec:
  type: NodePort
  selector: {app: frontend}
  ports: [{port: 8501, targetPort: 8501, nodePort: 30501}]

