apiVersion: apps/v1
kind: Deployment
metadata: {name: api, namespace: cinegraph}
spec:
  replicas: 1
  selector: {matchLabels: {app: api}}
  template:
    metadata: {labels: {app: api}}
    spec:
      containers:
        - name: api
          image: cinegraph-api:latest
          imagePullPolicy: IfNotPresent
          env:
            - {name: AWS_REGION, value: "us-east-1"}
            - name: SNS_TOPIC_ARN
              valueFrom: {secretKeyRef: {name: sns-config, key: topic-arn, optional: true}}
          ports: [{containerPort: 8000}]
          readinessProbe: {httpGet: {path: /health, port: 8000}, initialDelaySeconds: 10, periodSeconds: 5}
          resources:
            requests: {cpu: 250m, memory: 512Mi}
            limits: {cpu: "2", memory: 2Gi}
---
apiVersion: v1
kind: Service
metadata: {name: api, namespace: cinegraph}
spec:
  selector: {app: api}
  ports: [{port: 8000, targetPort: 8000}]
